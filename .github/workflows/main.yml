name: Update Profile Stats and 3D Contrib

on:
  schedule:
    # Runs every 6 hours to keep both stats and 3D contribution graphs updated
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger anytime

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Generate 3D Contribution Graph
      uses: yoshi389111/github-profile-3d-contrib@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USERNAME: Satya37x1112

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        pip install requests python-dateutil lxml

    - name: Generate SVG Templates
      run: python generate_ascii_svg.py

    - name: Update Stats in SVGs
      env:
        ACCESS_TOKEN: ${{ secrets.MAIN }}
        USER_NAME: 'Satya37x1112'
      run: python update_stats.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add profile-3d-contrib/ cache/ dark_mode.svg light_mode.svg README.md
        git diff-index --quiet HEAD || git commit -m "Auto-update profile stats and 3D contribution graph"
        git push
