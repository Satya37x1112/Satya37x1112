name: Update Profile Stats

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger anytime

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        pip install requests python-dateutil lxml

    - name: Generate SVG Templates
      run: python generate_ascii_svg.py

    - name: Update Stats in SVGs
      env:
        ACCESS_TOKEN: ${{ secrets.MAIN }}
        USER_NAME: 'Satya37x1112'
      run: python update_stats.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add cache/ dark_mode.svg light_mode.svg
        git diff-index --quiet HEAD || git commit -m "Auto-update profile stats"
        git push
