name: Update Profile Stats

on:
  schedule:
    # Runs everyday at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        pip install requests python-dateutil lxml

    - name: Run Update Script
      env:
        ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        USER_NAME: 'Satya37x1112'
      run: python update_stats.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add cache/ dark_mode.svg light_mode.svg
        git diff-index --quiet HEAD || git commit -m "Metrics auto-update"
        git push